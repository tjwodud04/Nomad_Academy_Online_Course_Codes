<!DOCTYPE html>
<html>
    <head>
        <title>Job Search</title>
        <style>
            section {
                display: grid;
                gap: 20px;
                grid-template-columns: repeat(4, 1fr);
            }
        </style>
    </head>
    <body>
        <h1>Job Search</h1>
        <h3>Found {{resultsNumber}} results for: {{searchingBy}}</h3>
        <a href="/export?word={{searchingBy}}">Export to CSV</a>
        <section>
            <h4>Title</h4>
            <h4>Company</h4>
            <h4>Location</h4>
            <h4>Link</h4>
            {% for job in jobs %}
            <span>{{job.title | e}}</span>
            <span>{{job.company | e}}</span>
            <span>{{job.location | e}}</span>
            <a href="{{job.link | e}}" target="_blank" rel="noopener noreferrer">Apply</a>
            {% endfor %}
        </section>
    </body>
</html>
